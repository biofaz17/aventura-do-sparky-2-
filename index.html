  <style>
    html,
    body,
    #root {
      min-height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      overflow-x: hidden;
      font-family: 'Nunito', sans-serif;
      background-color: #f0f9ff;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }

    #root {
      position: relative;
      min-height: 100vh;
      z-index: 1;
    }

    /* Ensure the app content renders above the subtle pattern overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('/assets/patterns/stardust.png');
      background-repeat: repeat;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    /* Habilita scroll e toque onde necessário */
    .scrollable-y {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }

    .scrollable-x {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }

    /* Elementos clicáveis */
    button,
    a,
    input {
      touch-action: manipulation;
    }

    h1,
    h2,
    h3,
    .font-heading {
      font-family: 'Fredoka One', cursive;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
  </style>
